services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: nurean
      MYSQL_USER: nurean
      MYSQL_PASSWORD: nurean
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev-mysql
      LOG_DIR: /app/logs
      DB_URL: jdbc:mysql://db:3306/nurean?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
      DB_USERNAME: nurean
      DB_PASSWORD: nurean
      JWT_SECRET: YalinyAutismMapSecretKey2025SuperSecure!
    volumes:
      - ./logs:/app/logs
    depends_on:
      - db
    ports:
      - "8095:8095"

volumes:
  db_data: